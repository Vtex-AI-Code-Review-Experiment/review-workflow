name: Reusable Gemini Code Review

on:
  workflow_call:
    inputs:
      usd_brl_rate:
        description: 'Taxa de câmbio USD/BRL para cálculo de custo'
        required: false
        type: string
        default: '5.16'
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files and diff
        id: files
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          
          # Get list of changed files, excluding binaries and lock files
          git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD | \
            grep -vE '\.(png|jpg|jpeg|gif|ico|svg|webp|bmp|woff|woff2|ttf|eot|otf|pdf|zip|tar|gz|rar|7z|exe|dll|so|dylib|bin|lock)$' | \
            grep -vE '(package-lock\.json|yarn\.lock|pnpm-lock\.yaml|Cargo\.lock|go\.sum|composer\.lock|Gemfile\.lock|poetry\.lock)$' > changed_files.txt || true
          
          if [ ! -s changed_files.txt ]; then
            echo "has_files=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "has_files=true" >> $GITHUB_OUTPUT
          
          # Get the unified diff with line numbers for context
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD -- $(cat changed_files.txt | tr '\n' ' ') > diff.patch
          
          # Create a file with full content + line numbers for each changed file
          mkdir -p output
          
          # Include PR metadata for better context
          cat >> output/combined.txt << METADATA_EOF
          ===== PULL REQUEST METADATA =====
          Title: ${PR_TITLE}
          Author: ${PR_AUTHOR}
          Branch: ${PR_HEAD} -> ${PR_BASE}
          Description:
          ${PR_BODY:-No description provided.}
          =================================
          
          METADATA_EOF
          
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              echo "===== FILE: $file =====" >> output/combined.txt
              cat -n "$file" >> output/combined.txt
              echo -e "\n" >> output/combined.txt
            fi
          done < changed_files.txt
          
          # Also include the diff for context on what changed
          echo "\n===== GIT DIFF =====" >> output/combined.txt
          cat diff.patch >> output/combined.txt
          
          # Protection: check combined file size (rough token estimate: 1 char ~ 0.25 tokens)
          FILE_SIZE=$(wc -c < output/combined.txt)
          ESTIMATED_TOKENS=$((FILE_SIZE / 4))
          echo "Estimated input size: $FILE_SIZE bytes (~$ESTIMATED_TOKENS tokens)"
          
          # Gemini 2.5 Flash context window is 1M tokens; warn if PR is very large
          if [ "$ESTIMATED_TOKENS" -gt 900000 ]; then
            echo "::warning::PR is very large (~$ESTIMATED_TOKENS tokens). Review may be truncated or fail."
          fi
          
          echo "ESTIMATED_SIZE=$ESTIMATED_TOKENS" >> $GITHUB_OUTPUT

      - name: Create prompt file
        if: steps.files.outputs.has_files == 'true'
        run: |
          cat > prompt.txt << 'PROMPT_EOF'
          You are an autonomous code review agent acting as the first-line auditor before a human reviewer.

          Goal:
          - Reduce the human reviewer's workload by filtering for genuinely relevant defects.
          - Focus on issues related to functionality, security, architecture, and code evolvability.
          - Avoid purely cosmetic comments or feedback based only on personal preference.
          - Produce a table that maps every detected occurrence to its error category.

          Scope:
          - Analyze the files and changed hunks in this pull request.
          - Read surrounding context when needed to validate a finding, but keep the review centered on the PR diff.
          - Treat each distinct occurrence as a separate finding. For example, if there are two logic defects, report two findings instead of merging them into one.
          - Say explicitly the LLM model used on review.

          Taxonomy:
          Evolvability:
          - Evolvability.Textual: Purely textual problems in the code. Examples: unclear names, obscure abbreviations, names that do not match behavior, missing comments where logic is complex, incorrect or outdated comments, or violations of naming and textual style conventions.
          - Evolvability.SupportedByLanguage: Defects in language-supported self-documentation. Examples: poorly chosen access modifiers, missing or imprecise types when clearer typing is possible, or missing immutability where values should not change.
          - Evolvability.VisualRepresentation: Visual representation problems in the way the code is shown on screen. Examples: inconsistent or confusing indentation, poor blank-line usage or grouping, or awkward alignment of parameters, blocks, and expressions. These do not change runtime behavior, but they slow reading and increase the chance of mistakes.
          - Evolvability.Organizational: Problems in where functionality lives. Examples: responsibilities placed in the wrong module, classes or methods with too many responsibilities, dead code, or duplicated code that should be extracted to a common place.
          - Evolvability.SolutionApproach: Problems in the chosen implementation approach. Examples: inappropriate data structures, reimplementing standard library behavior without justification, algorithms more complex than necessary, code with no useful effect, or semantic duplication.

          Functional:
          - Functional.Support: Defects in support tooling and infrastructure. Examples: incorrect build, deploy, or environment configuration, or use of the wrong version of external libraries. These issues may block compilation, execution, or cause environment-specific behavior.
          - Functional.Timing: Concurrency and ordering defects. Examples: race conditions, deadlocks, ordering bugs, or memory visibility issues across threads or async flows.
          - Functional.Logic: Incorrect behavior caused by wrong reasoning in the implementation. Examples: incorrect if/while conditions, mistakes in calculations, formulas, aggregations, conversions, or incorrect control flow that skips, reorders, or misses required handling.
          - Functional.Check: Defects that increase the chance of failures or invalid data passing unnoticed. Examples: missing checks of fallible return values, missing or incorrect input validation, or incomplete verification before using a resource such as an array index, file handle, or nullable value.
          - Functional.Resource: Defects involving allocation, initialization, use, reuse, or release of resources. Examples: memory leaks, failing to close files/connections/sockets, incorrect initialization of variables or data structures, or incorrect reuse of objects and buffers causing state corruption. These issues can cause failures, performance degradation, or unpredictable behavior.
          - Functional.Interface: Incorrect use of internal or external interfaces. Examples: swapped parameters, wrong argument types, contract violations, or misuse of APIs.
          - Functional.LargerDefect: A larger missing or incomplete behavior. Examples: an important requirement is not implemented, a key user flow is incomplete, or the change would require broader restructuring to be correct.

          Other categories:
          - FalsePositive: Use only when reviewing a previous finding or when code looks suspicious at first glance but is correct after deeper analysis and consistent with the codebase conventions.
          - General: Use only if a relevant issue truly does not fit any category above.

          Classification rules:
          - Every finding must belong to exactly one category from the taxonomy above.
          - Prefer the most specific category available.
          - Use `General` only when no taxonomy category fits after careful analysis.
          - Use `FalsePositive` only when it is clearly justified by the surrounding code and conventions.

          Severity guide:
          - `Block`: likely to cause incorrect behavior, security risk, data corruption, broken flows, or high-confidence regressions. Security issues are usually `Block`.
          - `Flag`: important design, structure, or maintainability concern that should normally be addressed before merge, even if it is not an immediate runtime defect.
          - `Suggest`: worthwhile improvement, but not strong enough on its own to block the PR.

          Review task:
          1. Analyze the PR and identify:
          - logic or control-flow bugs
          - missing validation or missing checks
          - resource, interface, timing, and support issues
          - evolvability issues related to textual clarity, language-supported documentation, visual representation, organization, and solution approach
          2. Prevent quality regressions: if the diff removes important validations, tests, or checks without an adequate replacement, treat that as a relevant defect.
          3. Treat security risks as high priority, including unsafe handling of user input, exposed secrets, or authentication/authorization bypasses.
          4. Do not report low-value style-only comments unless they clearly map to the taxonomy and have practical review value.

          Output format:
          1. Start with an occurrence table with one row per finding:
          - Columns: `ID | Category | Severity | File | Approx. line | Short description` 
          - Do not merge separate occurrences, even when they share the same category.
          2. Then provide full details for each real finding using this format:
          - Category: <Evolvability.Textual | Evolvability.Organizational | Functional.Logic | Functional.Check | ...>
          - Severity: <Suggest | Flag | Block>
          - File: path/to/file.ext
          - Approx. line: X
          - Description: short, objective, technical description. Start the sentence with the same category in brackets, for example: `[Functional.Logic] incorrect loop exit condition`.
          - Suggestion: how to fix or improve the issue.

          Final summary:
          - PR risk: Low | Medium | High
          - Main defect categories found
          - List of blocking items
          - If there are no relevant findings, output exactly:
          "No relevant issues found in this PR. PR risk: Low."

          Code to review:
          PROMPT_EOF

      - name: Build request and estimate tokens
        id: estimate
        if: steps.files.outputs.has_files == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Build request with systemInstruction separated from contents
          # This gives higher priority to the prompt instructions
          jq -n \
            --rawfile prompt prompt.txt \
            --rawfile code output/combined.txt \
            '{
              "systemInstruction": {
                "parts": [{
                  "text": $prompt
                }]
              },
              "contents": [{
                "parts": [{
                  "text": $code
                }]
              }],
              "generationConfig": {
                "temperature": 1.0,
                "maxOutputTokens": 65536,
                "thinkingConfig": {
                  "thinkingBudget": 16384
                }
              },
              "safetySettings": [
                {"category": "HARM_CATEGORY_HARASSMENT", "threshold": "BLOCK_ONLY_HIGH"},
                {"category": "HARM_CATEGORY_HATE_SPEECH", "threshold": "BLOCK_ONLY_HIGH"},
                {"category": "HARM_CATEGORY_SEXUALLY_EXPLICIT", "threshold": "BLOCK_ONLY_HIGH"},
                {"category": "HARM_CATEGORY_DANGEROUS_CONTENT", "threshold": "BLOCK_ONLY_HIGH"}
              ]
            }' > request.json

          COUNT_RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:countTokens?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @request.json)

          ESTIMATED_INPUT=$(echo "$COUNT_RESPONSE" | jq -r '.totalTokens // "N/A"')
          echo "ESTIMATED_INPUT=$ESTIMATED_INPUT" >> $GITHUB_OUTPUT
          echo "Estimated input tokens: $ESTIMATED_INPUT"

      - name: Send to Gemini API
        id: gemini
        if: steps.files.outputs.has_files == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          USD_BRL_RATE: ${{ inputs.usd_brl_rate }}
        run: |
          # Retry with exponential backoff (3 attempts)
          MAX_RETRIES=3
          RETRY_DELAY=5
          RESPONSE=""
          
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $attempt/$MAX_RETRIES..."
            
            HTTP_RESULT=$(curl -s -w "\n%{http_code}" -X POST \
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
              -H "Content-Type: application/json" \
              -d @request.json)
            
            HTTP_CODE=$(echo "$HTTP_RESULT" | tail -n1)
            RESPONSE=$(echo "$HTTP_RESULT" | sed '$d')
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "API call succeeded (HTTP 200)"
              break
            fi
            
            echo "API returned HTTP $HTTP_CODE"
            
            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              if [ "$HTTP_CODE" = "429" ] || [ "$HTTP_CODE" = "500" ] || [ "$HTTP_CODE" = "503" ]; then
                echo "Retryable error. Waiting ${RETRY_DELAY}s before retry..."
                sleep $RETRY_DELAY
                RETRY_DELAY=$((RETRY_DELAY * 2))
              else
                echo "Non-retryable error. Aborting."
                break
              fi
            fi
          done

          REVIEW_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "Erro: Não foi possível processar a resposta da IA."')
          
          INPUT_TOKENS=$(echo "$RESPONSE" | jq -r '.usageMetadata.promptTokenCount // 0')
          THINKING_TOKENS=$(echo "$RESPONSE" | jq -r '.usageMetadata.thoughtsTokenCount // 0')
          OUTPUT_TOKENS=$(echo "$RESPONSE" | jq -r '.usageMetadata.candidatesTokenCount // 0')
          TOTAL_TOKENS=$(echo "$RESPONSE" | jq -r '.usageMetadata.totalTokenCount // 0')

          # Preços Gemini 2.5 Flash por 1M tokens (USD)
          INPUT_PRICE=0.15
          THINKING_PRICE=3.50
          OUTPUT_PRICE=0.60

          # Calcular custos em USD
          INPUT_COST_USD=$(echo "scale=6; $INPUT_TOKENS * $INPUT_PRICE / 1000000" | bc)
          THINKING_COST_USD=$(echo "scale=6; $THINKING_TOKENS * $THINKING_PRICE / 1000000" | bc)
          OUTPUT_COST_USD=$(echo "scale=6; $OUTPUT_TOKENS * $OUTPUT_PRICE / 1000000" | bc)
          TOTAL_COST_USD=$(echo "scale=6; $INPUT_COST_USD + $THINKING_COST_USD + $OUTPUT_COST_USD" | bc)

          # Calcular custos em BRL
          INPUT_COST_BRL=$(echo "scale=4; $INPUT_COST_USD * $USD_BRL_RATE" | bc)
          THINKING_COST_BRL=$(echo "scale=4; $THINKING_COST_USD * $USD_BRL_RATE" | bc)
          OUTPUT_COST_BRL=$(echo "scale=4; $OUTPUT_COST_USD * $USD_BRL_RATE" | bc)
          TOTAL_COST_BRL=$(echo "scale=4; $TOTAL_COST_USD * $USD_BRL_RATE" | bc)

          echo "REVIEW<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW_TEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "INPUT_TOKENS=$INPUT_TOKENS" >> $GITHUB_OUTPUT
          echo "THINKING_TOKENS=$THINKING_TOKENS" >> $GITHUB_OUTPUT
          echo "OUTPUT_TOKENS=$OUTPUT_TOKENS" >> $GITHUB_OUTPUT
          echo "TOTAL_TOKENS=$TOTAL_TOKENS" >> $GITHUB_OUTPUT
          echo "INPUT_COST_USD=$INPUT_COST_USD" >> $GITHUB_OUTPUT
          echo "THINKING_COST_USD=$THINKING_COST_USD" >> $GITHUB_OUTPUT
          echo "OUTPUT_COST_USD=$OUTPUT_COST_USD" >> $GITHUB_OUTPUT
          echo "TOTAL_COST_USD=$TOTAL_COST_USD" >> $GITHUB_OUTPUT
          echo "INPUT_COST_BRL=$INPUT_COST_BRL" >> $GITHUB_OUTPUT
          echo "THINKING_COST_BRL=$THINKING_COST_BRL" >> $GITHUB_OUTPUT
          echo "OUTPUT_COST_BRL=$OUTPUT_COST_BRL" >> $GITHUB_OUTPUT
          echo "TOTAL_COST_BRL=$TOTAL_COST_BRL" >> $GITHUB_OUTPUT
          echo "USD_BRL_RATE=$USD_BRL_RATE" >> $GITHUB_OUTPUT

      - name: Parse table and create inline comments
        if: steps.files.outputs.has_files == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Save review text to file for parsing
          cat << 'REVIEW_EOF' > review_output.txt
          ${{ steps.gemini.outputs.REVIEW }}
          REVIEW_EOF
          
          # Robust parser for the occurrence table
          # Format: | ID | Category | Severity | File | Approx. line | Short description |
          # Handles: leading/trailing spaces, backticks in cells, markdown formatting
          COMMENTS_JSON="[]"
          PARSED_COUNT=0
          SKIPPED_COUNT=0
          
          while IFS= read -r line; do
            # Strip leading/trailing whitespace
            line=$(echo "$line" | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
            
            # Must contain at least 6 pipe characters (7 columns) to be a data row
            PIPE_COUNT=$(echo "$line" | tr -cd '|' | wc -c)
            if [ "$PIPE_COUNT" -lt 6 ]; then
              continue
            fi
            
            # Skip header rows (contain "ID" or "Category" as column names)
            if echo "$line" | grep -qiE '\|\s*(ID|Category|Severity)\s*\|'; then
              continue
            fi
            
            # Skip separator rows (contain only pipes, dashes, spaces, colons)
            if echo "$line" | grep -qE '^\|[\s:|-]+\|$'; then
              continue
            fi
            
            # Parse the table row - strip backticks and extra formatting
            ID=$(echo "$line" | awk -F'|' '{gsub(/^[ \t`]+|[ \t`]+$/, "", $2); print $2}')
            CATEGORY=$(echo "$line" | awk -F'|' '{gsub(/^[ \t`*]+|[ \t`*]+$/, "", $3); print $3}')
            SEVERITY=$(echo "$line" | awk -F'|' '{gsub(/^[ \t`*]+|[ \t`*]+$/, "", $4); print $4}')
            FILE=$(echo "$line" | awk -F'|' '{gsub(/^[ \t`]+|[ \t`]+$/, "", $5); print $5}')
            LINE_NUM=$(echo "$line" | awk -F'|' '{gsub(/^[ \t`~]+|[ \t`~]+$/, "", $6); gsub(/[^0-9]/, "", $6); print $6}')
            DESC=$(echo "$line" | awk -F'|' '{gsub(/^[ \t`]+|[ \t`]+$/, "", $7); print $7}')
            
            # Validate: file must exist in diff, line must be a number
            if [ -n "$FILE" ] && [ -n "$LINE_NUM" ] && [ "$LINE_NUM" -gt 0 ] 2>/dev/null; then
              BODY="**[$CATEGORY]** $SEVERITY: $DESC"
              
              # Add to JSON array using jq for safe escaping
              COMMENTS_JSON=$(echo "$COMMENTS_JSON" | jq \
                --arg path "$FILE" \
                --argjson line "$LINE_NUM" \
                --arg body "$BODY" \
                '. += [{"path": $path, "line": $line, "body": $body}]')
              
              PARSED_COUNT=$((PARSED_COUNT + 1))
              echo "  [$PARSED_COUNT] $FILE:$LINE_NUM ($SEVERITY) - $CATEGORY"
            else
              SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
              echo "  [SKIP] Could not parse row: $line"
            fi
          done < review_output.txt
          
          COMMENT_COUNT=$(echo "$COMMENTS_JSON" | jq 'length')
          echo ""
          echo "=== Parser Summary ==="
          echo "Parsed: $PARSED_COUNT | Skipped: $SKIPPED_COUNT | Total comments: $COMMENT_COUNT"
          
          if [ "$COMMENT_COUNT" -gt 0 ]; then
            PR_NUMBER=${{ github.event.pull_request.number }}
            REPO=${{ github.repository }}
            COMMIT_SHA=${{ github.event.pull_request.head.sha }}
            
            # Create the review via GitHub API
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/reviews" \
              -d "$(jq -n \
                --arg sha "$COMMIT_SHA" \
                --arg body "**Gemini AI Code Review** - $COMMENT_COUNT findings. See inline comments below." \
                --argjson comments "$COMMENTS_JSON" \
                '{commit_id: $sha, body: $body, event: "COMMENT", comments: $comments}')")
            
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            RESP_BODY=$(echo "$RESPONSE" | sed '$d')
            
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              echo "Successfully created review with $COMMENT_COUNT inline comments"
            else
              echo "Failed to create review (HTTP $HTTP_CODE)"
              echo "Response: $RESP_BODY"
              
              # Fallback: try posting comments one by one if batch fails
              echo "Attempting individual comments as fallback..."
              SUCCESS=0
              for i in $(seq 0 $((COMMENT_COUNT - 1))); do
                COMMENT=$(echo "$COMMENTS_JSON" | jq -c ".[$i]")
                C_PATH=$(echo "$COMMENT" | jq -r '.path')
                C_LINE=$(echo "$COMMENT" | jq -r '.line')
                C_BODY=$(echo "$COMMENT" | jq -r '.body')
                
                SINGLE_RESP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                  -H "Authorization: Bearer $GH_TOKEN" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/comments" \
                  -d "$(jq -n \
                    --arg sha "$COMMIT_SHA" \
                    --arg path "$C_PATH" \
                    --argjson line "$C_LINE" \
                    --arg body "$C_BODY" \
                    '{commit_id: $sha, path: $path, line: $line, body: $body}')")
                
                if [ "$SINGLE_RESP" = "201" ]; then
                  SUCCESS=$((SUCCESS + 1))
                else
                  echo "  Failed comment on $C_PATH:$C_LINE (HTTP $SINGLE_RESP)"
                fi
              done
              echo "Fallback: $SUCCESS/$COMMENT_COUNT comments posted individually"
            fi
          else
            echo "No inline comments to create (no table rows parsed)"
          fi

      - name: Comment on PR
        if: steps.files.outputs.has_files == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ github.token }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Gemini 2.5 Flash Code Review
            
            ${{ steps.gemini.outputs.REVIEW }}
            
            ---
            <details>
            <summary> Token Usage & Cost (USD/BRL rate: ${{ steps.gemini.outputs.USD_BRL_RATE }})</summary>
            
            | Metric | Tokens | Cost (USD) | Cost (BRL) |
            |--------|-------:|------------|------------|
            | Input | ${{ steps.gemini.outputs.INPUT_TOKENS }} | ${{ steps.gemini.outputs.INPUT_COST_USD }} | R$ ${{ steps.gemini.outputs.INPUT_COST_BRL }} |
            | Thinking | ${{ steps.gemini.outputs.THINKING_TOKENS }} | ${{ steps.gemini.outputs.THINKING_COST_USD }} | R$ ${{ steps.gemini.outputs.THINKING_COST_BRL }} |
            | Output | ${{ steps.gemini.outputs.OUTPUT_TOKENS }} | ${{ steps.gemini.outputs.OUTPUT_COST_USD }} | R$ ${{ steps.gemini.outputs.OUTPUT_COST_BRL }} |
            | **Total** | ${{ steps.gemini.outputs.TOTAL_TOKENS }} | **${{ steps.gemini.outputs.TOTAL_COST_USD }}** | **R$ ${{ steps.gemini.outputs.TOTAL_COST_BRL }}** |
            
            </details>
